<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Class AI | Chat</title>
    <style>
        :root {
            --bg-color: #131314;
            --surface-color: #1e1f20;
            --text-color: #e3e3e3;
            --accent-blue: #4285f4;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background-color: var(--bg-color); 
            color: var(--text-color);
            font-family: 'Segoe UI', Roboto, sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Top Bar */
        nav {
            padding: 16px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .logo { font-size: 1.2rem; font-weight: 500; color: #8e918f; }

        /* Profile & Logout Menu */
        .profile-area { position: relative; }
        .user-avatar {
            width: 40px; height: 40px;
            background: var(--accent-blue);
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-weight: bold;
            font-size: 18px;
        }
        .logout-dropdown {
            display: none;
            position: absolute;
            top: 50px;
            right: 0;
            background: #282a2c;
            min-width: 150px;
            border-radius: 8px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.4);
            z-index: 100;
        }
        .logout-dropdown a {
            color: white;
            padding: 12px 16px;
            text-decoration: none;
            display: block;
            font-size: 14px;
        }
        .logout-dropdown a:hover { background: #3c4043; border-radius: 8px; }
        .profile-area:hover .logout-dropdown { display: block; }

        /* Center Content */
        main {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            max-width: 800px;
            margin: 0 auto;
            width: 90%;
        }
        .welcome-title {
            font-size: 3.5rem;
            font-weight: 500;
            margin-bottom: 40px;
            background: linear-gradient(to right, #4285f4, #9b72cb, #d96570);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-align: center;
        }
        .search-box {
            width: 100%;
            background: var(--surface-color);
            border: 1px solid #444746;
            border-radius: 30px;
            padding: 12px 24px;
            display: flex;
            align-items: center;
        }
        .search-box input {
            flex: 1;
            background: transparent;
            border: none;
            color: white;
            font-size: 1.1rem;
            padding: 10px;
            outline: none;
        }
        .icon { font-size: 1.5rem; cursor: pointer; opacity: 0.7; }
    </style>
</head>
<body>
    <nav>
        <div class="logo">Smart Class 1.0</div>
        <div class="profile-area">
            <div class="user-avatar">{{ user.username|first|upper }}</div>
            <div class="logout-dropdown">
                <a href="{% url 'user_profile' %}">Profile</a>
                <a href="{% url 'logout' %}">Sign Out</a>
            </div>
        </div>
    </nav>

    <main>
        <h1 class="welcome-title">Hello, {{ user.username }}</h1>
        <div class="search-box">
            <input type="text" placeholder="Enter a prompt here...">
            <div class="icon">✦</div>
        </div>
        <p style="margin-top: 20px; color: #8e918f; font-size: 0.8rem;">
            Smart Class AI can provide information about your courses and help you study.
        </p>
    </main>
</body>
</html>
