<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EDU-TZ AI | Create Account</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        body { 
            font-family: 'Inter', sans-serif; 
            /* Background: Tanzanian Safari Sunset - Symbolizing Growth */
            background: linear-gradient(rgba(0, 0, 0, 0.5), rgba(0, 0, 0, 0.8)), 
                        url('https://images.unsplash.com/photo-1516426122078-c23e76319801?q=80&w=2068&auto=format&fit=crop'); 
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
        }
        
        .serif { font-family: 'Playfair Display', serif; }

        .liquid-glass {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(30px) saturate(150%);
            -webkit-backdrop-filter: blur(30px) saturate(150%);
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.6);
        }

        .input-glass {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.15);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .input-glass:focus {
            background: rgba(255, 255, 255, 0.12);
            border-color: rgba(255, 255, 255, 0.4);
            outline: none;
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.05);
        }

        .fade-up {
            animation: fadeUp 1s cubic-bezier(0.22, 1, 0.36, 1) forwards;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Accent for the registration button to differentiate from login */
        .btn-register {
            background: linear-gradient(135deg, #ffffff 0%, #e2e8f0 100%);
            color: #1a365d;
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-6 py-12">

    <div class="w-full max-w-lg fade-up">
        <!-- Brand Header -->
        <div class="text-center mb-10">
            <div class="inline-flex items-center justify-center w-14 h-14 bg-white/10 backdrop-blur-md rounded-2xl mb-4 border border-white/20">
                <span class="text-white font-bold text-2xl tracking-tighter">TZ</span>
            </div>
            <h2 class="serif text-4xl text-white tracking-tight">Join the Ecosystem</h2>
            <p class="text-white/60 text-sm mt-3 max-w-xs mx-auto">Start your journey with the #1 National AI for Tanzanian Schools.</p>
        </div>

        <div class="liquid-glass p-8 md:p-12 rounded-[40px] text-white relative overflow-hidden">
            <!-- Decorative Glow -->
            <div class="absolute -top-24 -right-24 w-48 h-48 bg-blue-500/20 blur-[80px] rounded-full"></div>
            
            <!-- Django Messages -->
            {% if messages %}
                {% for message in messages %}
                    <div class="mb-8 p-4 rounded-2xl bg-red-500/20 border border-red-500/40 text-red-100 text-sm flex items-start gap-3">
                        <i class="fas fa-circle-exclamation mt-1"></i>
                        <span>{{ message }}</span>
                    </div>
                {% endfor %}
            {% endif %}

            <form method="post" class="space-y-6 relative z-10">
                {% csrf_token %}
                
                <div class="grid md:grid-cols-2 gap-6">
                    <div>
                        <label class="block text-[10px] font-bold uppercase tracking-[0.2em] text-white/40 mb-2 ml-1">Username</label>
                        <input type="text" name="username" placeholder="Unique ID" 
                               class="w-full input-glass rounded-2xl px-5 py-4 text-sm placeholder:opacity-20" required>
                    </div>

                    <div>
                        <label class="block text-[10px] font-bold uppercase tracking-[0.2em] text-white/40 mb-2 ml-1">Email Address</label>
                        <input type="email" name="email" placeholder="name@school.tz" 
                               class="w-full input-glass rounded-2xl px-5 py-4 text-sm placeholder:opacity-20" required>
                    </div>
                </div>

                <div>
                    <label class="block text-[10px] font-bold uppercase tracking-[0.2em] text-white/40 mb-2 ml-1">Password</label>
                    <input type="password" name="password" placeholder="••••••••" 
                           class="w-full input-glass rounded-2xl px-5 py-4 text-sm placeholder:opacity-20" required>
                </div>

                <div>
                    <label class="block text-[10px] font-bold uppercase tracking-[0.2em] text-white/40 mb-2 ml-1">Confirm Password</label>
                    <input type="password" name="password_confirm" placeholder="••••••••" 
                           class="w-full input-glass rounded-2xl px-5 py-4 text-sm placeholder:opacity-20" required>
                </div>

                <div class="pt-4">
                    <button type="submit" class="w-full btn-register py-5 rounded-2xl font-bold text-sm hover:scale-[1.02] active:scale-95 transition-all shadow-2xl flex items-center justify-center gap-2">
                        Create My Account <i class="fas fa-arrow-right text-[10px]"></i>
                    </button>
                </div>
            </form>
            
            <div class="mt-10 pt-8 border-t border-white/10 text-center">
                <p class="text-sm text-white/40">
                    Already a member? 
                    <a href="{% url 'login_page' %}" class="text-white font-bold hover:text-blue-200 transition-colors ml-1 underline underline-offset-4">Sign in here</a>
                </p>
            </div>
        </div>

        <!-- Compliance Tag -->
        <div class="flex items-center justify-center gap-4 mt-12 opacity-30">
            <div class="h-[1px] w-12 bg-white"></div>
            <span class="text-[9px] uppercase tracking-[0.4em] text-white font-bold">Policy Aligned 2026</span>
            <div class="h-[1px] w-12 bg-white"></div>
        </div>
    </div>

</body>
</html>
