<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EDU-TZ AI | Sign In</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <!-- FontAwesome for Social Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        body { 
            font-family: 'Inter', sans-serif; 
            /* Background: Tanzanian City Skyline */
            background: linear-gradient(rgba(0, 0, 0, 0.4), rgba(0, 0, 0, 0.7)), 
                        url('https://images.unsplash.com/photo-1596438411210-67c4e5113601?q=80&w=2070&auto=format&fit=crop'); 
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
        }
        
        .serif { font-family: 'Playfair Display', serif; }

        .liquid-glass {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(25px) saturate(180%);
            -webkit-backdrop-filter: blur(25px) saturate(180%);
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .input-glass {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.2);
            transition: all 0.3s ease;
        }

        .input-glass:focus {
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.5);
            outline: none;
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.1);
        }

        .fade-up {
            animation: fadeUp 0.8s cubic-bezier(0.22, 1, 0.36, 1) forwards;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-6">

    <div class="w-full max-w-md fade-up">
        <!-- Logo / Brand -->
        <div class="text-center mb-8">
            <div class="inline-flex items-center justify-center w-12 h-12 bg-white rounded-2xl mb-4 shadow-lg">
                <span class="text-blue-900 font-bold text-xl">TZ</span>
            </div>
            <h2 class="serif text-3xl text-white tracking-tight">Welcome Back</h2>
            <p class="text-white/60 text-sm mt-2">Access the National AI Ecosystem</p>
        </div>

        <div class="liquid-glass p-8 md:p-10 rounded-[32px] text-white">
            
            <!-- Message Handling -->
            {% if messages %}
                {% for message in messages %}
                    <div class="mb-6 p-4 rounded-xl bg-red-500/20 border border-red-500/50 text-red-200 text-sm flex items-center gap-3">
                        <i class="fas fa-circle-exclamation"></i>
                        {{ message }}
                    </div>
                {% endfor %}
            {% endif %}

            <form method="post" class="space-y-5">
                {% csrf_token %}
                
                <div>
                    <label class="block text-xs font-bold uppercase tracking-widest text-white/50 mb-2 ml-1">Username or Email</label>
                    <input type="text" name="username" placeholder="mwalimu@edu.go.tz" 
                           class="w-full input-glass rounded-2xl px-5 py-4 text-sm placeholder:opacity-30" required>
                </div>

                <div>
                    <label class="block text-xs font-bold uppercase tracking-widest text-white/50 mb-2 ml-1">Password</label>
                    <input type="password" name="password" placeholder="••••••••" 
                           class="w-full input-glass rounded-2xl px-5 py-4 text-sm placeholder:opacity-30" required>
                </div>

                <div class="flex items-center justify-end">
                    <a href="#" class="text-[11px] font-bold text-white/40 hover:text-white transition uppercase tracking-wider">Forgot Password?</a>
                </div>

                <button type="submit" class="w-full bg-white text-blue-900 py-4 rounded-2xl font-bold text-sm hover:scale-[1.02] active:scale-95 transition-all shadow-xl">
                    Sign In
                </button>
            </form>

            <!-- Social Logins -->
            <div class="relative my-8">
                <div class="absolute inset-0 flex items-center"><span class="w-full border-t border-white/10"></span></div>
                <div class="relative flex justify-center text-xs uppercase"><span class="bg-transparent px-4 text-white/30 tracking-[0.2em] font-bold">Or continue with</span></div>
            </div>

            <div class="grid grid-cols-2 gap-4">
                <a href="{% url 'google_login' %}" class="flex items-center justify-center gap-2 py-3 rounded-xl border border-white/10 hover:bg-white/5 transition text-xs font-semibold">
                    <i class="fab fa-google text-red-400"></i> Google
                </a>
                <a href="{% url 'apple_login' %}" class="flex items-center justify-center gap-2 py-3 rounded-xl border border-white/10 hover:bg-white/5 transition text-xs font-semibold">
                    <i class="fab fa-apple"></i> Apple
                </a>
            </div>
            
            <p class="mt-10 text-center text-sm text-white/50">
                New to the system? 
                <a href="{% url 'register_page' %}" class="text-white font-bold hover:underline ml-1">Register here</a>
            </p>
        </div>

        <p class="text-center mt-8 text-[10px] uppercase tracking-[0.3em] text-white/30">
            Secure National Authentication &copy; 2026
        </p>
    </div>

</body>
</html>
